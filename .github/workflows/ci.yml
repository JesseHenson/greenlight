name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --frozen --dev
      - run: uv run pytest -v

  deploy:
    needs: [lint-frontend, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: dopplerhq/cli-action@v3
        with:
          token: ${{ secrets.DOPPLER_TOKEN }}

      - name: Deploy to Cloud Run
        run: |
          doppler run -- sh -c 'gcloud run deploy greenlight \
            --region=us-central1 \
            --source=. \
            --allow-unauthenticated \
            --set-env-vars="ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY,SECRET_KEY=$SECRET_KEY,CLERK_SECRET_KEY=$CLERK_SECRET_KEY,CLERK_PUBLISHABLE_KEY=$CLERK_PUBLISHABLE_KEY,DATABASE_URL=$DATABASE_URL,CORS_ORIGINS=$CORS_ORIGINS,PRODUCTION=$PRODUCTION,SENTRY_DSN=$SENTRY_DSN,APP_URL=$APP_URL" \
            --set-build-env-vars="VITE_CLERK_PUBLISHABLE_KEY=$CLERK_PUBLISHABLE_KEY,VITE_SENTRY_DSN=$VITE_SENTRY_DSN"'
